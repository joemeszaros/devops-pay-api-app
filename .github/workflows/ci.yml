name: pay-api CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: /tmp/pay-api-app-coverage
          if-no-files-found: error

      - name: Build
        run: npm run build

      - name: Docker build smoke tests
        run: |
          docker build -t pay-api:ci .
          docker build -f Dockerfile.currency-exchange -t currency-exchange:ci .
