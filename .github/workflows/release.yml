name: pay-api Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: pay-api-release-prod
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: prod

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      GITOPS_REPOSITORY: ${{ vars.GITOPS_REPOSITORY }}
      PAY_API_VALUES_FILE: ${{ vars.GITOPS_VALUES_FILE }}
      CURRENCY_EXCHANGE_VALUES_FILE: apps/currency-exchange-prod/values-prod.yaml

    steps:
      - name: Checkout app repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push images
        id: images
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_URI="${REGISTRY}/${ECR_REPOSITORY}"
          PAY_API_TAG="${IMAGE_TAG}-pay-api"
          CURRENCY_EXCHANGE_TAG="${IMAGE_TAG}-currency-exchange"

          docker build -t "${IMAGE_URI}:${PAY_API_TAG}" .
          docker push "${IMAGE_URI}:${PAY_API_TAG}"

          docker build -f Dockerfile.currency-exchange -t "${IMAGE_URI}:${CURRENCY_EXCHANGE_TAG}" .
          docker push "${IMAGE_URI}:${CURRENCY_EXCHANGE_TAG}"

          PAY_API_DIGEST="$(aws ecr describe-images \
            --repository-name "${ECR_REPOSITORY}" \
            --image-ids imageTag="${PAY_API_TAG}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)"

          CURRENCY_EXCHANGE_DIGEST="$(aws ecr describe-images \
            --repository-name "${ECR_REPOSITORY}" \
            --image-ids imageTag="${CURRENCY_EXCHANGE_TAG}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)"

          echo "repository=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"
          echo "tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "pay_api_digest=${PAY_API_DIGEST}" >> "${GITHUB_OUTPUT}"
          echo "currency_exchange_digest=${CURRENCY_EXCHANGE_DIGEST}" >> "${GITHUB_OUTPUT}"

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPOSITORY }}
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops

      - name: Update GitOps values files
        working-directory: gitops
        env:
          IMAGE_REPOSITORY: ${{ steps.images.outputs.repository }}
          PAY_API_DIGEST: ${{ steps.images.outputs.pay_api_digest }}
          CURRENCY_EXCHANGE_DIGEST: ${{ steps.images.outputs.currency_exchange_digest }}
          PAY_API_VALUES_FILE: ${{ env.PAY_API_VALUES_FILE }}
          CURRENCY_EXCHANGE_VALUES_FILE: ${{ env.CURRENCY_EXCHANGE_VALUES_FILE }}
        run: |
          set -euo pipefail
          test -n "${PAY_API_VALUES_FILE}"
          test -n "${CURRENCY_EXCHANGE_VALUES_FILE}"

          sed -i.bak -E "s#(^  repository: ).*#\\1${IMAGE_REPOSITORY}#" "${PAY_API_VALUES_FILE}"
          sed -i.bak -E "s#(^  digest: ).*#\\1${PAY_API_DIGEST}#" "${PAY_API_VALUES_FILE}"

          sed -i.bak -E "s#(^  repository: ).*#\\1${IMAGE_REPOSITORY}#" "${CURRENCY_EXCHANGE_VALUES_FILE}"
          sed -i.bak -E "s#(^  digest: ).*#\\1${CURRENCY_EXCHANGE_DIGEST}#" "${CURRENCY_EXCHANGE_VALUES_FILE}"

          rm -f "${PAY_API_VALUES_FILE}.bak" "${CURRENCY_EXCHANGE_VALUES_FILE}.bak"

      - name: Create promotion pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops
          commit-message: "chore(services): promote image set ${{ steps.images.outputs.tag }}"
          branch: "promote/services-${{ steps.images.outputs.tag }}"
          delete-branch: true
          title: "Promote pay-api services image set ${{ steps.images.outputs.tag }} to prod"
          body: |
            Automated promotion from the application repository.

            - repository: `${{ steps.images.outputs.repository }}`
            - pay-api digest: `${{ steps.images.outputs.pay_api_digest }}`
            - currency-exchange digest: `${{ steps.images.outputs.currency_exchange_digest }}`
